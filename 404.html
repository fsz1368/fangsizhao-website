<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · 页面未找到 — 方思照</title>
  <link href="/assets/lib/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0A0E17; color: #ECEFF4; font-family: "Inter","PingFang SC","Microsoft YaHei",-apple-system,sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .code { font-size: 8rem; font-weight: 800; color: #E8990C; line-height: 1; margin-bottom: 0.5rem; }
    .msg { font-size: 1.25rem; color: #7C8798; margin-bottom: 2rem; }
    .btn-home { padding: 12px 32px; border-radius: 8px; background: #E8990C; color: #0A0E17; font-weight: 600; text-decoration: none; transition: transform 0.15s ease-out; display: inline-block; }
    .btn-home:hover { transform: scale(0.96); color: #0A0E17; }
    .qr { margin-top: 2rem; }
    .qr img { width: 140px; border-radius: 12px; border: 1px solid rgba(124,135,152,0.15); }
    .qr p { font-size: 0.8rem; color: #7C8798; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <p class="msg">你找的页面飞走了——就像无人机出了信号范围 🛸</p>
    <a href="/" class="btn-home">← 回到首页</a>
    <div class="qr">
      <img src="/assets/qr-code.png" alt="扫码访问网站">
      <p>扫码直接打开网站</p>
    </div>
  </div>
</body>
</html>
